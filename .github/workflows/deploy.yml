name: Pubblica il sito su GitHub Pages

# Si attiva automaticamente a ogni push su main: GitHub compila il sito
# (npm install + npm run build) e pubblica il risultato su Pages.
# Non serve MAI compilare nulla a mano su questo computer.
on:
  push:
    branches: [main]
  workflow_dispatch: # permette anche di rilanciarlo a mano da GitHub

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Scarica il codice
        uses: actions/checkout@v4

      - name: Prepara Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Installa le dipendenze
        run: npm install

      - name: Compila il sito
        run: npm run build

      - name: Prepara il deploy
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Pubblica su GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
